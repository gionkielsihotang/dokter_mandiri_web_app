<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dokter Mandiri</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Dokter Mandiri</h2>
            <form id="loginForm" method="POST" action="dashboard.html">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password">
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #7f8c8d;">
                By Kelompok 3 - Dokter Mandiri
            </p>
        </div>
    </div>
</body>
</html>
